name: PyPI release 🐍 📦

on:
  push:
    tags:
      - 'v*'
      - '!v1.*'
      - '!v2.*'
      - '!v3.0.*'
      - '!v3.1.*'
      - '!*\+docs'

env:
  TZ: Europe/Zurich
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22.x'

permissions:
  contents: read

jobs:
  build:
    name: Build package 📦
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        name: Set up Python 🐍
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
      - name: Install build deps 🔧
        run: sudo apt-get install libpq-dev
      - name: Check version 🔍
        run: uv run --no-sync --isolated --with hatchling .github/utils/check_version.py "${GITHUB_REF#refs/tags/v}"
      - name: Extract changelog 📜
        run: python .github/utils/extract_changelog.py "${GITHUB_REF#refs/tags/v}" /tmp/changelog.md
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        name: Setup Node
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Install Indico + Python deps 🔧
        run: uv pip install --system -e '.[dev]'
      - name: Install npm deps ☕
        run: npm ci
      - name: Build wheel 🏗
        run: ./bin/maintenance/build-wheel.py indico
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        name: Upload build artifacts 📦
        with:
          name: indico-wheel
          retention-days: 7
          path: ./dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        name: Store Markdown changelog 📜
        with:
          name: changelog
          retention-days: 7
          path: /tmp/changelog.md
  create-github-release:
    name: Create GitHub release 🐙
    # Upload wheel to a GitHub release. It remains available as a build artifact for a while as well.
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        name: Download build artifacts 📦
      - name: Create draft release 🐙
        run: >-
          gh release create
          --draft
          --repo ${{ github.repository }}
          --title ${GITHUB_REF_NAME}
          --notes-file changelog/changelog.md
          ${GITHUB_REF_NAME}
          indico-wheel/*
        env:
          GH_TOKEN: ${{ github.token }}
  publish-pypi:
    name: Publish 🚀
    needs: build
    # Wait for approval before attempting to upload to PyPI. This allows reviewing the
    # files in the draft release.
    environment: publish
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      # Try uploading to Test PyPI first, in case something fails.
      - name: Publish to Test PyPI 🧪
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: indico-wheel/
          attestations: false
      - name: Publish to PyPI 🚀
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: indico-wheel/
      - name: Publish GitHub release 🐙
        run: >-
          gh release edit
          --draft=false
          --repo ${{ github.repository }}
          ${GITHUB_REF_NAME}
        env:
          GH_TOKEN: ${{ github.token }}
