name: Claude Code Review

on:
  pull_request:
    branches:
      - dev-docker-setup
    types: [opened, synchronize, ready_for_review, reopened]
    paths-ignore:
      - '.github/workflows/claude-code-review.yml'

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 #5.0.0
        with:
          role-to-assume: ${{ secrets.TELEMEND_AWS_ASSUME_ROLE_ARN }}
          aws-region: ${{ env.AWS_DEFAULT_REGION || 'us-east-1' }}

      - name: Install Telemend MCP
        run: |
          aws s3 cp s3://telemend-private-beta-artifacts/mcp/telemend-mcp.zip ./
          unzip telemend-mcp.zip -d /tmp/telemend-mcp/
          pip install /tmp/telemend-mcp/

      - name: Create Telemend MCP config
        run: |
          cat > /tmp/mcp-config.json << 'EOF'
          {
            "mcpServers": {
              "telemend": {
                "command": "python3",
                "args": ["-m", "telemend_mcp.server"],
                "env": {
                  "TELEMEND_API_URL": "https://application-signals-beta.us-west-2.api.aws",
                  "AWS_REGION": "us-west-2"
                }
              }
            }
          }
          EOF

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          show_full_output: "true"
          claude_args: |
            --model us.anthropic.claude-opus-4-6-v1 --mcp-config /tmp/mcp-config.json --allowedTools "Bash(gh pr *),Bash(gh api *),Bash(python3 *),Bash(awk *),mcp__telemend__get_health_overview,mcp__telemend__list_functions,mcp__telemend__search_functions,mcp__telemend__get_function_details,mcp__telemend__get_endpoints,mcp__telemend__get_incidents,mcp__telemend__get_incident_details,mcp__telemend__find_deployment,mcp__telemend__get_code_context,mcp__telemend__audit_slos,mcp__telemend__query_service_metrics,mcp__telemend__search_transaction_spans,mcp__telemend__get_xray_trace"
          prompt: |
            You are performing a telemetry-enriched code review. You have access to production telemetry via Telemend MCP tools. Use them to augment your review with real-world runtime data.

            ## Phase 1: Determine Service Context

            1. Use `gh pr diff` or the PR file list to identify which files and functions are modified.
            2. From the file paths and codebase structure, determine which service or package this PR modifies (e.g., a Python web service, a specific microservice). This is your **target service** — all telemetry queries should be scoped to it.

            ## Phase 2: Gather Telemetry (scoped to the target service)

            3. Call `get_health_overview` (hours=24) to get the current service state.
            4. Call `get_incidents` (hours=24, limit=5) to see recent incidents.
            5. If SLOs are available, call `audit_slos` to check for breaches.
            6. **Filter for relevance**: From the results, discard anything that belongs to a different service, language runtime, or package than what this PR modifies. Only keep telemetry for the target service.

            ## Phase 3: Profile Changed Functions

            7. For each modified function, call `search_functions` with the function name to find it in telemetry.
            8. For functions found, call `get_function_details` (include_exceptions=true) to get:
               - Call frequency and caller graph
               - Duration stats (avg, min, max) — performance baseline
               - Exception breakdown and error rates
               - Which endpoints this function serves

            ## Phase 4: Telemetry-Informed Review

            Use the telemetry data alongside traditional code review:

            - **High-traffic functions** (>1000 calls/day): Flag changes that could affect performance. Cite the call volume.
            - **Caller blast radius**: If a function has many callers, flag signature or behavioral contract changes.
            - **Performance-sensitive paths**: If latency is already high, flag changes that add I/O, loops, or overhead.
            - **Issue correlation** (IMPORTANT): For each SLO breach or incident that involves code modified by this PR, explicitly state one of:
              - **"Addressed by this PR"** — the change fixes or mitigates this issue, with brief reasoning
              - **"Not addressed"** — the issue exists in related code but this PR does not fix it
              - Omit issues that are entirely unrelated to the modified code.

            ## Phase 5: Standard Code Review

            Also review for (regardless of telemetry):
            - Bugs, logic errors, and edge cases
            - Security issues (SQL injection, XSS, auth bypasses, secrets in code)
            - Code quality (readability, maintainability, naming)
            - Error handling and resource cleanup
            - Test coverage gaps

            ## Output Format

            Post your findings as **inline review comments** on the relevant PR lines. Structure each comment to include:
            - The issue found
            - Severity (critical / warning / info)
            - If telemetry informed the finding, briefly cite the data (e.g., "This function handles ~5k calls/day with avg=120ms")

            At the end, post a summary comment on the PR with:
            - A **"Runtime Context"** section containing ONLY telemetry relevant to the target service and modified code:
              - Service health summary (errors, call volumes for affected functions)
              - For each relevant SLO breach or incident: a one-line verdict on whether this PR addresses it
              - Do NOT include SLO breaches, incidents, or metrics from unrelated services
            - A **"Review Findings"** section with a count of issues by severity
            - If telemetry tools fail or return no data, note this and proceed with a standard code review

            ## Important Guidelines

            - Telemetry is ONE input to your review, not the only one. Always do a thorough code review regardless.
            - If telemetry tools fail or the service has no telemetry data, proceed with a normal code review — do not block on telemetry.
            - Only report telemetry that is relevant to the service and code being changed. Omit unrelated services entirely.
            - Do NOT use any instrumentation management tools. You only have read-only observability access.
            - Keep the review focused and actionable. Do not dump raw telemetry data into comments.
